x-podman:
  in_pod: false

x-service-base: &x-service-base
  profiles: [base]
  tty: true
  cgroup: private
  user: root
  userns_mode: keep-id:uid=1001,gid=1001

  cap_add:
    - SYS_ADMIN
    - SYS_NICE
    - SYS_PTRACE
    - SETPCAP
    - NET_RAW
    - NET_BIND_SERVICE
    - IPC_LOCK

  volumes:
    - type: bind
      source: .
      target: ${PWD}

  working_dir: ${PWD}

  environment: &base-environment
    GITHUB_ACTIONS: ${GITHUB_ACTIONS:-}

  healthcheck:
    interval: 10s
    start_period: 2m
    test:
      - CMD
      - systemctl
      - is-system-running

x-service-openrc: &x-service-openrc
  <<: *x-service-base

  healthcheck:
    interval: 10s
    start_period: 2m
    test:
      - CMD
      - gdbus
      - wait
      - -y
      - org.freedesktop.PolicyKit1

x-service-packagekit: &x-service-packagekit
  <<: *x-service-base
  profiles: [packagekit]

services:
  centos-10:
    <<: *x-service-base
    environment:
      <<: *base-environment
      BUILD_DIR: ${PWD}/tests/build-centos-10
    build:
