name: ci

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: 5 4 * * *

concurrency:
  group: ${{ github.workflow }}/${{ github.ref }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/eslint-stylish-problem-matcher

      - run: npm ci
      - run: npm run lint

      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0

  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    outputs:
      services: ${{ steps.compose.outputs.services }}
      packagekit-services: ${{ steps.compose.outputs.packagekit-services }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: systemctl --user enable --now podman.socket

      - id: compose
        run: |
          services="$(podman compose --profile base config --services | sort | jq -cnR '[inputs]')"
          echo "services=$services" | tee -a "$GITHUB_OUTPUT"

          packagekit_services="$(podman compose --profile packagekit config --services | sort | jq -cnR '[inputs]')"
          echo "packagekit-services=$packagekit_services" | tee -a "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - lint
      - plan

    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.plan.outputs.services) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: systemctl --user enable --now podman.socket

      - id: packagekit-up
        if: contains(fromJSON(needs.plan.outputs.packagekit-services), env.SERVICE)
        run: podman compose up --build --wait "$SERVICE"
        env:
          SERVICE: ${{ matrix.image }}-packagekit

      - run: podman exec --latest -u testuser tests/e2e-tests.sh
        if: ${{ !cancelled() && steps.packagekit-up.outcome == 'success' }}

      - run: podman compose --profile packagekit down
        if: ${{ !cancelled() && steps.packagekit-up.outcome != 'skipped' }}

      - id: base-up
        if: ${{ !cancelled() }}
        run: podman compose up --build --wait "$SERVICE"
        env:
          SERVICE: ${{ matrix.image }}

      - run: podman exec --latest -u testuser tests/e2e-tests.sh
        if: ${{ !cancelled() && steps.base-up.outcome == 'success' }}

      - run: podman compose --profile base down
        if: ${{ !cancelled() && steps.base-up.outcome != 'skipped' }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: ${{ always() }}
        with:
          name: ${{ matrix.image }}
          path: tests/build-*/meson-logs

  doc:
    needs: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - run: npm ci
      - run: npm run doc

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: out
          name: docs-${{ github.run_attempt }}

  doc-publish:
    if: github.ref_name == github.event.repository.default_branch
    needs: doc
    runs-on: ubuntu-slim
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        with:
          artifact_name: docs-${{ github.run_attempt }}
